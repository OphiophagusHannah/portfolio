<style>

.main {
  width: 60%;
  margin: auto;
  max-width: 1200px;
}

.section-header {
  color: #bbb;
  text-transform: uppercase;
  font-size: 1.2rem;
}
.position {
  text-transform: uppercase;
}
/*.highlights {
  display: none;
}*/

.tab {
  position: relative;
  margin-bottom: 1px;
  width: 100%;
  color: #fff;
  overflow: hidden;
}
input {
  position: absolute;
  opacity: 0;
  z-index: -1;
}
label {
  position: relative;
  display: block;
  padding: 0 0 0 1em;
  background: grey;
  font-weight: bold;
  line-height: 3;
  cursor: pointer;
}
.tab-content {
  max-height: 0;
  overflow: hidden;
  background: lightgrey;
  color: black;
  transition: max-height .35s;
}

.tab-content p {
  margin: 1em;
}
/* :checked */
input:checked ~ .tab-content {
  max-height: 100rem;
}
/* Icon */
label::after {
  position: absolute;
  right: 0;
  top: 0;
  display: block;
  width: 3em;
  height: 3em;
  line-height: 3;
  text-align: center;
  -webkit-transition: all .35s;
  -o-transition: all .35s;
  transition: all .35s;
}
input[type=checkbox] + label::after {
  content: "+";
}

input[type=checkbox]:checked + label::after {
  transform: rotate(315deg);
}


</style>

<body>

<div class="main">
<section id="basic">
  <div id="name"></div>
  <div id="label"></div>
  <div id="email"></div>
</section>
<section id="work">
  <h2 class="section-header">Related Experience</h2>

</section>
<section id="education">
  <h2 class="section-header">Education</h2>
</section>
<section id="skills">
  <h2 class="section-header">Skills</h2>
</section>
</div>

<script>

//
var obj = JSON.parse(JSON.stringify(resumeJSON));
//Basic Info
document.getElementById("name").innerHTML =
obj.basics.first_name + " " + obj.basics.last_name;
document.getElementById("label").innerHTML = obj.basics.label;
document.getElementById("email").innerHTML = obj.basics.email;


//Work info

count = 0;
Object.entries(obj.work).map(([key, value]) => {
  var work = JSON.parse(JSON.stringify(value));
  count++;
    var company = document.createElement("div");
    company.className = 'company';
    company.innerHTML = work.company;

    var position = document.createElement("h3");
    position.className = 'position';
    position.innerHTML = work.position;

    var time = document.createElement("span");
    time.className = 'time';
    time.innerHTML = work.startDate + " - " + work.endDate;

    var skills = document.createElement("div");
    skills.className = 'skills';
    Object.entries(work.skills).map(([key, value]) => {
        var keys = JSON.parse(JSON.stringify(value));
        var keyword = document.createElement("span");
        keyword.innerHTML = keys + " | ";
        skills.appendChild(keyword);

    })

    var responsibilities = document.createElement("div");
    responsibilities.className = 'tab';
    var highlights = document.createElement("div");
    highlights.className = 'tab-content';
    Object.entries(work.highlights).map(([key, value]) => {
        var keys = JSON.parse(JSON.stringify(value));
        var keyword = document.createElement("div");
        keyword.innerHTML = "-" + keys;
        highlights.appendChild(keyword);
    });


    var title = document.createElement("label");
    var check = document.createElement("input");
    title.innerHTML= "Responsibilities";
    check.setAttribute("type", "checkbox");
    check.setAttribute("id", 'tab-' + count);
    check.setAttribute("name", 'tabs');
    title.setAttribute("for", 'tab-' + count);
    responsibilities.appendChild(check);
    responsibilities.appendChild(title);
    responsibilities.appendChild(highlights);
    var workplace = document.getElementById("work").appendChild(document.createElement("div"));
    workplace.className = 'workplace';

    workplace.appendChild(position);
    workplace.appendChild(time);
    workplace.appendChild(company);
    workplace.appendChild(skills);
    workplace.appendChild(responsibilities);
});


//Education

Object.entries(obj.education).map(([key, value]) => {
    var education = JSON.parse(JSON.stringify(value));
    var institution = document.createElement("div");
    var area = document.createElement("div");
    var time = document.createElement("div");
    institution.innerHTML = education.institution;
    area.innerHTML = education.area;
    time.innerHTML = education.startDate + " - " + education.endDate;
    document.getElementById("education").appendChild(institution).appendChild(area).appendChild(time);
})

//Skills Info

Object.entries(obj.skills).map(([key, value]) => {
    var skills = JSON.parse(JSON.stringify(value));
    var div = document.createElement("div");
    div.innerHTML = skills.name + ": ";
    document.getElementById("skills").appendChild(div);

    Object.entries(skills.keywords).map(([key, value]) => {

        var keys = JSON.parse(JSON.stringify(value));
        var keyword = document.createElement("span");
        keyword.innerHTML = keys + " | ";
        div.appendChild(keyword);

    })
})

</script>
